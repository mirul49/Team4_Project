<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeRush Leaderboard</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo-link">
      <div class="logo">
        <img src="TypeRush.jpg" alt="TypeRush logo" class="site-logo">
        <h1>TypeRush</h1>
      </div>
    </a>

    <div class="nav-links">
      <a href="login.html">Login</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="settings.html">Settings</a>
    </div>
  </nav>

  <main class="container">
    <div class="card leaderboard-header">
      <div>
        <h2>Leaderboard</h2>
        <p>Top players are ranked from highest score to lowest score for each time mode.</p>
      </div>
      <div class="leaderboard-actions">
        <button type="button" class="difficulty-btn active" data-timelimit="20">20s</button>
        <button type="button" class="difficulty-btn" data-timelimit="30">30s</button>
      </div>
    </div>

    <section id="notSignedInBox" class="card">
      <h3>You are not signed in</h3>
      <p>Please sign in to see your leaderboard rankings.</p>
      <button onclick="goToLogin()">Sign in to see leaderboard</button>
    </section>

    <section id="leaderboardBox" class="card">
      <h3 id="welcomeMessage"></h3>
      <p>Your best typing run is saved automatically after 20s and 30s tests only.</p>

      <div class="leaderboard-table-wrapper">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Username</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="leaderboardTable">
            <!-- Scores will appear here using JavaScript -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/leaderboard.js"></script>
</body>
</html>
