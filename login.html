<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeRush - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo-link">
      <div class="logo">
        <img src="TypeRush.jpg" alt="TypeRush logo" class="site-logo">
        <h1>TypeRush</h1>
      </div>
    </a>

    <div class="nav-links">
      <a href="leaderboard.html">Leaderboard</a>
      <a href="settings.html">Settings</a>
    </div>
  </nav>

  <main class="container auth-container">
    <div class="card auth-card">
      <h2>Welcome back</h2>
      <p>Sign in to save your best typing records and view your personal leaderboard progress.</p>

      <div id="authMessage" class="auth-message"></div>

      <form class="auth-form" id="loginForm">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter your username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>
      </form>

      <p class="auth-switch">
        No account? <a href="register.html">Register here</a>
      </p>
      <p class="auth-switch">
        <a href="index.html">Continue as guest</a>
      </p>
    </div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const messageBox = document.getElementById('authMessage');

    const params = new URLSearchParams(window.location.search);
    if (params.get('registered') === '1') {
      messageBox.textContent = 'Account created successfully. Please log in.';
      messageBox.className = 'auth-message success';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        messageBox.textContent = 'Please enter both username and password.';
        messageBox.className = 'auth-message error';
        return;
      }

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.message || 'Login failed.');
        }

        localStorage.setItem('typerush-current-user', result.username);
        window.location.href = 'index.html';
      } catch (error) {
        messageBox.textContent = error.message;
        messageBox.className = 'auth-message error';
      }
    });
  </script>
</body>
</html>
